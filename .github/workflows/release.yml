name: Release Obsidian Plugin

on:
  push:
    tags:
      - "*"

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Validate release version
        run: |
          node <<'NODE'
          const fs = require("fs");

          const tag = process.env.GITHUB_REF_NAME;
          const packageVersion = require("./package.json").version;
          const manifestVersion = require("./manifest.json").version;
          const versions = JSON.parse(fs.readFileSync("versions.json", "utf8"));

          if (!/^\d+\.\d+\.\d+$/.test(tag)) {
            throw new Error(`Release tag must be plain SemVer without a v prefix: ${tag}`);
          }

          if (tag !== packageVersion || tag !== manifestVersion) {
            throw new Error(`Tag/version mismatch: tag=${tag}, package=${packageVersion}, manifest=${manifestVersion}`);
          }

          if (!(tag in versions)) {
            throw new Error(`versions.json is missing ${tag}`);
          }
          NODE

      - name: Lint source
        run: |
          npm run lint:store
          npm run lint

      - name: Build plugin
        run: npm run build

      - name: Generate artifact attestations for main.js
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: main.js

      - name: Generate artifact attestations for styles.css
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: styles.css

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            main.js
            manifest.json
            styles.css
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
